version: "3.9"

# ── Shared configuration ────────────────────────────────────────────────────
x-app-env: &app-env
  ANTHROPIC_API_KEY:       ${ANTHROPIC_API_KEY}
  BROWSERBASE_API_KEY:     ${BROWSERBASE_API_KEY:-}
  DATABASE_URL:            postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/computeruse
  REDIS_URL:               redis://redis:6379/0
  AWS_ACCESS_KEY_ID:       ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY:   ${AWS_SECRET_ACCESS_KEY:-}
  AWS_BUCKET_NAME:         ${AWS_BUCKET_NAME:-computeruse-replays}
  AWS_REGION:              ${AWS_REGION:-us-east-1}
  DEFAULT_MODEL:           ${DEFAULT_MODEL:-claude-sonnet-4-5}
  DEFAULT_TIMEOUT:         ${DEFAULT_TIMEOUT:-300}
  DEFAULT_MAX_STEPS:       ${DEFAULT_MAX_STEPS:-50}
  SESSION_DIR:             /app/sessions
  REPLAY_DIR:              /app/replays

x-app-volumes: &app-volumes
  - sessions:/app/sessions
  - replays:/app/replays

x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
  environment:
    <<: *app-env
  volumes: *app-volumes
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

# ── Services ────────────────────────────────────────────────────────────────
services:

  # ── FastAPI application server ────────────────────────────────────────────
  app:
    <<: *app-base
    container_name: computeruse_app
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - internal
      - public

  # ── Celery worker ─────────────────────────────────────────────────────────
  celery:
    <<: *app-base
    container_name: computeruse_celery
    # Override the default CMD to start the Celery worker instead.
    command:
      - celery
      - -A
      - backend.tasks
      - worker
      - --loglevel=info
      - --concurrency=2          # two browser processes per worker container
      - --queues=default
      - --hostname=worker@%h
    # Workers don't serve HTTP traffic; no port mapping needed.
    healthcheck:
      test: ["CMD", "celery", "-A", "backend.tasks", "inspect", "ping", "-d", "worker@$$HOSTNAME"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal

  # ── Celery Beat scheduler (optional periodic tasks) ───────────────────────
  celery-beat:
    <<: *app-base
    container_name: computeruse_beat
    command:
      - celery
      - -A
      - backend.tasks
      - beat
      - --loglevel=info
      - --scheduler=celery.beat:PersistentScheduler
    profiles:
      - scheduler        # only started when --profile scheduler is passed
    networks:
      - internal

  # ── Redis (message broker + Celery result backend) ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: computeruse_redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # ── PostgreSQL database ───────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: computeruse_postgres
    environment:
      POSTGRES_DB:       computeruse
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d computeruse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

# ── Named volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  sessions:
    driver: local
  replays:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  # internal: database / redis / workers — not exposed externally
  internal:
    driver: bridge
    internal: false     # set true in production to isolate from host network
  # public: API server — exposed to the host / reverse proxy
  public:
    driver: bridge
